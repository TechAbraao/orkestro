info: 
  version: "1.0.0" 
  title: "API RESTful - Pizza Management System"

paths:
  # Menus Endpoints
  /api/menus:
    get:
      tags:
        - "Menus"
      summary: "Retrieve all menus"
      description: "Fetch a list of all available menus."
      responses:
        '200':
          description: "A list of menus"
    post:
      tags:
        - "Menus"
      summary: "Create a new menu"
      description: "Add a new menu to the system."
      parameters:
        - in: body
          name: menu
          description: "Menu object to be created"
          required: true
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
      responses:
        '201':
          description: "Menu created successfully"

  # Categories Endpoints
  /api/categories:
    get:
      tags:
        - "Categories"
      summary: "Retrieve all categories"
      description: "Fetch a list of all available categories."
      responses:
        '200':
          description: "A list of categories"
    post:
      tags:
        - "Categories"
      summary: "Create a new category"
      description: "Add a new category to the system."
      parameters:
        - in: body
          name: category
          description: "Category object to be created"
          required: true
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
      responses:
        '201':
          description: "Category created successfully"
