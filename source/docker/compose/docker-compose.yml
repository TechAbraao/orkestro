services:
  postgres:
    image: postgres:16.3
    container_name: postgres-pizza-management-system
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - network-pizza-management-system

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-pizza-management-system
    ports:
      - "${PGADMIN_HOST}:${PGADMIN_PORT}"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      - postgres
    networks:
      - network-pizza-management-system

volumes:
  pgdata:

networks:
  network-pizza-management-system: